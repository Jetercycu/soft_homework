<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣泡排序法示範</title>
    <style>
        body, html {
            min-height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px 16px 24px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: min(90vw, 900px);
        }

        h1 {
            margin: 0 0 12px;
        }

        #controls {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            background-color: #e0e0e0;
            border-radius: 6px;
            flex-wrap: wrap;
            gap: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        select, button, input {
            padding: 8px 12px;
            font-size: 16px;
        }

        .time-display {
            font-size: 18px;
            font-weight: bold;
        }

        #arrayContainer {
            display: flex;
            gap: 5px;
            align-items: flex-end;
            height: 50vh; /* 陣列區域最大佔據頁面高度一半 */
            min-height: 320px;
            width: 100%;
            border: 1px solid #ccc;
            background-color: white;
            padding: 0 8px;
            box-sizing: border-box;
        }

        .bar {
            width: 30px;
            background-color: #4CAF50;
            text-align: center;
            color: white;
            transition: height 0.2s, background-color 0.2s;
        }

        .legend {
            display: flex;
            justify-content: center;
            width: 100%;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 5px;
            margin-top: 12px;
            flex-wrap: wrap;
            gap: 12px;
            box-sizing: border-box;
        }
        .legend-item {
            display: flex;
            align-items: center;
        }
        .color-box {
            width: 20px;
            height: 20px;
            margin-right: 5px;
            border: 1px solid #ccc;
        }
        .algorithm-intro {
            width: 100%;
            margin-top: 12px;
            background-color: #ffffff;
            border: 1px solid #d4d4d4;
            border-radius: 6px;
            padding: 14px 16px;
            box-sizing: border-box;
        }
        .algorithm-intro h2 {
            margin: 0 0 8px;
            font-size: 20px;
        }
        .algorithm-intro p {
            margin: 0;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            #arrayContainer {
                min-height: 260px;
                height: 42vh;
            }

            .bar {
                width: 20px;
                font-size: 12px;
            }

            .time-display {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>氣泡排序法示範</h1>
        <div id="controls">
            <label for="sizeInput">陣列數量:</label>
            <select id="sizeInput">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="15">15</option>
                <option value="20">20</option>
            </select>
            <button id="generateBtn">生成新陣列</button>
            <button id="sortBtn">開始排序</button>
            <label for="speed">排序速度倍數:</label>
            <input type="range" id="speed" min="10" max="1000" value="100" step="10">
            <button id="homeBtn">回首頁</button>
            <div class="time-display">花費時間: <span id="time">0</span> 秒</div>
        </div>
        <div id="arrayContainer"></div>
        <div class="legend">
            <div class="legend-item">
                <div class="color-box" style="background-color: #4CAF50;"></div>
                <span>未排序</span>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background-color: #ef4444;"></div>
                <span>比較中</span>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background-color: #f59e0b;"></div>
                <span>交換中</span>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background-color: #16a34a;"></div>
                <span>已完成</span>
            </div>
            <div class="legend-item">
                <span>當前速度倍數: <span id="speed-value">1</span> 倍</span>
            </div>
        </div>
        <section class="algorithm-intro" aria-label="氣泡排序介紹">
            <h2>氣泡排序介紹</h2>
            <p>氣泡排序會反覆比較相鄰元素，若順序錯誤就交換，較大的值會像氣泡一樣逐步移到右側。此法概念直覺，平均與最差時間複雜度為 O(n^2)，適合用於教學與理解排序流程。</p>
        </section>
    </div>

    <script>
        const sizeInput = document.getElementById('sizeInput');
        const generateBtn = document.getElementById('generateBtn');
        const sortBtn = document.getElementById('sortBtn');
        const homeBtn = document.getElementById('homeBtn');
        const speedInput = document.getElementById('speed');
        const timeSpan = document.getElementById('time');
        const speedValueSpan = document.getElementById('speed-value');
        const container = document.getElementById('arrayContainer');
        let arr = [];
        let isSorting = false;
        let sortSpeed = 100;

        const COLORS = {
            default: '#4CAF50',
            comparing: '#ef4444',
            swapping: '#f59e0b',
            done: '#16a34a'
        };

        function buildSortedMap(startIndex) {
            const sortedMap = {};
            for (let i = startIndex; i < arr.length; i++) {
                sortedMap[i] = COLORS.done;
            }
            return sortedMap;
        }

        function renderArray(highlightMap = {}) {
            container.innerHTML = '';
            if (arr.length === 0) return;
            const maxVal = Math.max(...arr);
            arr.forEach((val, index) => {
                const bar = document.createElement('div');
                bar.classList.add('bar');
                const heightPercent = (val / maxVal) * 100;
                bar.style.height = heightPercent + '%';
                bar.style.backgroundColor = highlightMap[index] || COLORS.default;
                bar.textContent = val;
                container.appendChild(bar);
            });
        }

        function generateArray() {
            if (isSorting) return;

            const size = Math.min(20, Math.max(5, parseInt(sizeInput.value, 10) || 10));
            arr = [];
            for (let i = 0; i < size; i++) {
                arr.push(Math.floor(Math.random() * 90) + 10);
            }
            renderArray();
            timeSpan.textContent = '0';
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function getDelay() {
            return 1010 - sortSpeed;
        }

        async function bubbleSort() {
            if (isSorting) return;

            isSorting = true;
            generateBtn.disabled = true;
            sortBtn.disabled = true;
            sizeInput.disabled = true;

            const startTime = performance.now();

            for (let i = 0; i < arr.length; i++) {
                let swapped = false;

                for (let j = 0; j < arr.length - i - 1; j++) {
                    const compareMap = buildSortedMap(arr.length - i);
                    compareMap[j] = COLORS.comparing;
                    compareMap[j + 1] = COLORS.comparing;
                    renderArray(compareMap);
                    await sleep(getDelay());

                    if (arr[j] > arr[j + 1]) {
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                        swapped = true;

                        const swapMap = buildSortedMap(arr.length - i);
                        swapMap[j] = COLORS.swapping;
                        swapMap[j + 1] = COLORS.swapping;
                        renderArray(swapMap);
                        await sleep(getDelay());
                    }
                }

                renderArray(buildSortedMap(arr.length - i - 1));
                await sleep(Math.max(100, getDelay() / 2));

                if (!swapped) {
                    break;
                }
            }

            renderArray(buildSortedMap(0));
            const endTime = performance.now();
            timeSpan.textContent = ((endTime - startTime) / 1000).toFixed(2);

            isSorting = false;
            generateBtn.disabled = false;
            sortBtn.disabled = false;
            sizeInput.disabled = false;
        }

        generateBtn.addEventListener('click', generateArray);
        sortBtn.addEventListener('click', bubbleSort);
        homeBtn.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        speedInput.addEventListener('input', () => {
            sortSpeed = parseInt(speedInput.value, 10);
            speedValueSpan.textContent = (1000 / (1010 - sortSpeed)).toFixed(1);
        });

        // initialize
        generateArray();
        speedValueSpan.textContent = (1000 / (1010 - sortSpeed)).toFixed(1);
    </script>
</body>
</html>
