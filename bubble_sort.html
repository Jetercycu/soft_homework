<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>氣泡排序法示範</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        #controls {
            margin-bottom: 20px;
        }
        #arrayContainer {
            display: flex;
            gap: 5px;
            align-items: flex-end;
            height: 50vh; /* 陣列區域最大佔據頁面高度一半 */
        }
        .bar {
            width: 30px;
            background-color: #4CAF50;
            text-align: center;
            color: white;
        }
        #homeLink {
            position: absolute;
            top: 10px;
            left: 10px;
        }
    </style>
</head>
<body>
    <a id="homeLink" href="./" title="返回首頁">⬅️ 返回首頁</a>
    <div id="controls">
        陣列大小: <input type="number" id="sizeInput" min="2" max="10" value="5">
        <button id="generateBtn">生成陣列</button>
        <button id="sortBtn">開始排序</button>
    </div>
    <div id="arrayContainer"></div>

    <script>
        const sizeInput = document.getElementById('sizeInput');
        const generateBtn = document.getElementById('generateBtn');
        const sortBtn = document.getElementById('sortBtn');
        const container = document.getElementById('arrayContainer');
        let arr = [];

        function renderArray() {
            container.innerHTML = '';
            if (arr.length === 0) return;
            const maxVal = Math.max(...arr);
            arr.forEach(val => {
                const bar = document.createElement('div');
                bar.classList.add('bar');
                const heightPercent = (val / maxVal) * 100;
                bar.style.height = heightPercent + '%';
                bar.textContent = val;
                container.appendChild(bar);
            });
        }

        function generateArray() {
            const size = Math.min(10, Math.max(2, parseInt(sizeInput.value) || 2));
            arr = [];
            for (let i = 0; i < size; i++) {
                arr.push(Math.floor(Math.random() * 90) + 10);
            }
            renderArray();
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function bubbleSort() {
            const bars = container.children;
            for (let i = 0; i < arr.length; i++) {
                for (let j = 0; j < arr.length - i - 1; j++) {
                    if (arr[j] > arr[j + 1]) {
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                        renderArray();
                        await sleep(300);
                    }
                }
            }
        }

        generateBtn.addEventListener('click', generateArray);
        sortBtn.addEventListener('click', () => {
            bubbleSort();
        });

        // initialize
        generateArray();
    </script>
</body>
</html>
