<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>氣泡排序視覺化</title>
  <style>
    body {
      background-color: #333;
      color: white;
      font-family: Arial, sans-serif;
    }
    h2 {
      text-align: center;
    }
    .controls label {
      color: white;
    }
    .footer {
      color: white;
      margin-top: 10px;
      font-size: 13px;
    }
    .home-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #00f;
      text-decoration: underline;
    }
    #container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 300px;
      margin-top: 20px;
      border: 1px solid white;
    }
    .bar {
      margin: 0 2px;
      background-color: #00f;
      width: 20px;
      transition: height 0.2s;
    }
  </style>
</head>
<body>
  <div>
    <h2>氣泡排序視覺化</h2>
    <div class="controls">
      <label>數量: <input id="numInput" type="number" min="2" max="50" value="10"></label>
      <label>速度(ms): <input id="speedInput" type="range" min="10" max="1000" value="120"></label>
      <button id="genBtn">產生陣列</button>
      <button id="startBtn">開始排序</button>
      <button id="shuffleBtn">隨機重排</button>
    </div>

    <div id="container"></div>
    <div class="footer">說明: 調整數量後按「產生陣列」，再按「開始排序」。</div>
    <a href="index.html" class="home-link">回首頁</a>
  </div>

  <script>
    const container = document.getElementById('container');
    const numInput = document.getElementById('numInput');
    const genBtn = document.getElementById('genBtn');

    // 生成隨機陣列並顯示條狀圖
    function generateArray() {
      const numBars = parseInt(numInput.value, 10);
      const array = Array.from({ length: numBars }, () => Math.floor(Math.random() * 100) + 1);

      // 清空容器
      container.innerHTML = '';

      // 動態生成條狀圖
      array.forEach(value => {
        const bar = document.createElement('div');
        bar.classList.add('bar');
        bar.style.height = `${value * 3}px`; // 調整高度比例
        container.appendChild(bar);
      });
    }

    // 綁定按鈕事件
    genBtn.addEventListener('click', generateArray);
  </script>
</body>
</html>
