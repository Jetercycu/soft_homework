<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>氣泡排序視覺化</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,"Noto Sans TC",sans-serif;margin:16px;background:#f7f9fc}
    .controls{display:flex;gap:8px;align-items:center;margin-bottom:12px}
    .controls input[type=number]{width:80px;padding:6px}
    button{padding:6px 10px;border:0;border-radius:6px;background:#2b6cb0;color:#fff;cursor:pointer}
    button:disabled{opacity:.5;cursor:not-allowed}
    #container{display:flex;align-items:flex-end;height:360px;border-radius:6px;background:#fff;padding:12px;gap:4px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .bar{flex:1;background:#4a90e2;margin:0 2px;border-radius:3px;transition:height 180ms,background-color 120ms;display:flex;align-items:flex-end;justify-content:center;color:#fff;font-size:12px}
    .bar.small{font-size:10px}
    .label{margin-top:8px;color:#333}
    .footer{margin-top:10px;color:#666;font-size:13px}
  </style>
</head>
<body>
  <h2>氣泡排序視覺化</h2>
  <div class="controls">
    <label>數量: <input id="numInput" type="number" min="2" max="200" value="30"></label>
    <label>速度(ms): <input id="speedInput" type="range" min="10" max="1000" value="120"></label>
    <button id="genBtn">產生陣列</button>
    <button id="startBtn">開始排序</button>
    <button id="shuffleBtn">隨機重排</button>
  </div>

  <div id="container"></div>
  <div class="footer">說明: 調整數量後按「產生陣列」，再按「開始排序」。</div>

  <script>
    const container = document.getElementById('container');
    const numInput = document.getElementById('numInput');
    const speedInput = document.getElementById('speedInput');
    const genBtn = document.getElementById('genBtn');
    const startBtn = document.getElementById('startBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');

    let arr = [];
    function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min}

    function renderArray(a){
      container.innerHTML = '';
      const max = Math.max(...a);
      a.forEach(v=>{
        const bar = document.createElement('div');
        bar.className = 'bar' + (a.length>60?' small':'');
        const height = Math.max(6,Math.round((v / max) * 100));
        bar.style.height = (height * 2.8) + 'px';
        bar.dataset.value = v;
        bar.textContent = v;
        container.appendChild(bar);
      })
    }

    function generate(n){
      arr = Array.from({length:n},()=>randInt(5,200));
      renderArray(arr);
    }

    function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

    async function bubbleSort(a){
      const bars = ()=>Array.from(container.children);
      const n = a.length;
      const delay = ()=>Number(speedInput.value);
      for(let i=0;i<n;i++){
        let swapped=false;
        for(let j=0;j<n-1-i;j++){
          const b = bars();
          b[j].style.backgroundColor = '#f6ad55';
          b[j+1].style.backgroundColor = '#f6ad55';
          await sleep(delay());
          if(a[j] > a[j+1]){
            // swap in array
            [a[j],a[j+1]] = [a[j+1],a[j]];
            // swap visuals by heights & text
            b[j].style.height = b[j+1].style.height;
            b[j].textContent = b[j].dataset.value = a[j];
            b[j+1].style.height = (Math.max(6,Math.round((a[j+1]/Math.max(...a))*100))*2.8) + 'px';
            b[j+1].textContent = b[j+1].dataset.value = a[j+1];
            swapped=true;
            await sleep(Math.max(20,delay()/2));
          }
          b[j].style.backgroundColor = '#4a90e2';
          b[j+1].style.backgroundColor = '#4a90e2';
        }
        // mark last sorted
        const bFinal = Array.from(container.children);
        if(bFinal[n-1-i]) bFinal[n-1-i].style.backgroundColor = '#48bb78';
        if(!swapped) break;
      }
      // all green
      Array.from(container.children).forEach(x=>x.style.backgroundColor='#48bb78');
    }

    genBtn.addEventListener('click',()=>{
      const n = Math.max(2,Math.min(200,Number(numInput.value)||30));
      generate(n);
    });

    shuffleBtn.addEventListener('click',()=>{
      for(let i=arr.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
      }
      renderArray(arr);
    })

    startBtn.addEventListener('click',async ()=>{
      if(!arr.length) generate(Math.max(2,Number(numInput.value)||30));
      genBtn.disabled = true; startBtn.disabled = true; numInput.disabled = true; shuffleBtn.disabled = true; speedInput.disabled = true;
      await bubbleSort(arr);
      genBtn.disabled = false; startBtn.disabled = false; numInput.disabled = false; shuffleBtn.disabled = false; speedInput.disabled = false;
    });

    // initial
    generate(Number(numInput.value));
  </script>
</body>
</html>
