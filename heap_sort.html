
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>堆積排序法示範</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            padding: 20px 16px 24px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: min(90vw, 900px);
        }

        .array-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 400px;
            width: 100%;
            border: 1px solid #ccc;
            background-color: white;
            margin-bottom: 20px;
            padding: 0 8px;
            box-sizing: border-box;
        }

        .bar {
            width: 28px;
            background-color: #4CAF50;
            margin: 0 2px;
            transition: height 0.2s, background-color 0.2s;
            position: relative;
        }

        .bar-label {
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            background-color: #e0e0e0;
            border-radius: 6px;
            flex-wrap: wrap;
            gap: 10px;
            box-sizing: border-box;
        }

        select, button, input {
            padding: 8px 12px;
            font-size: 16px;
        }

        .time-display {
            font-size: 18px;
            font-weight: bold;
        }

        .legend {
            display: flex;
            justify-content: center;
            width: 100%;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 5px;
            margin-top: 10px;
            flex-wrap: wrap;
            gap: 12px;
            box-sizing: border-box;
        }

        .legend-item {
            display: flex;
            align-items: center;
        }

        .color-box {
            width: 20px;
            height: 20px;
            margin-right: 5px;
            border: 1px solid #ccc;
        }

        .algorithm-intro {
            width: 100%;
            margin-top: 12px;
            background-color: #ffffff;
            border: 1px solid #d4d4d4;
            border-radius: 6px;
            padding: 14px 16px;
            box-sizing: border-box;
        }

        .algorithm-intro h2 {
            margin: 0 0 8px;
            font-size: 20px;
        }

        .algorithm-intro p {
            margin: 0;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .array-container {
                height: 300px;
            }

            .bar {
                width: 20px;
                margin: 0 1px;
            }

            .bar-label {
                font-size: 10px;
            }

            .time-display {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>堆積排序法示範</h1>
        <div class="array-container" id="array-container"></div>
        <div class="controls">
            <label for="array-size">陣列數量:</label>
            <select id="array-size">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="15">15</option>
                <option value="20">20</option>
            </select>
            <button id="generate-btn">生成新陣列</button>
            <button id="sort-btn">開始排序</button>
            <label for="speed">排序速度倍數:</label>
            <input type="range" id="speed" min="10" max="1000" value="100" step="10">
            <button id="home-btn">回首頁</button>
            <div class="time-display">花費時間: <span id="time">0</span> 秒</div>
        </div>
        <div class="legend">
            <div class="legend-item">
                <div class="color-box" style="background-color: #3b82f6;"></div>
                <span>堆積範圍</span>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background-color: #ef4444;"></div>
                <span>比較中</span>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background-color: #f59e0b;"></div>
                <span>交換中</span>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background-color: #16a34a;"></div>
                <span>已排序</span>
            </div>
            <div class="legend-item">
                <span>當前速度倍數: <span id="speed-value">1</span> 倍</span>
            </div>
        </div>
        <section class="algorithm-intro" aria-label="堆積排序介紹">
            <h2>堆積排序介紹</h2>
            <p>堆積排序會先把資料建立成最大堆積，接著反覆將根節點（最大值）交換到尾端，並縮小堆積範圍再重建。其時間複雜度在平均與最差情況皆為 O(n log n)，且額外空間需求為 O(1)。</p>
        </section>
    </div>

    <script>
        let array = [];
        let arraySize = 10;
        let sortSpeed = 100;
        let isSorting = false;

        const COLORS = {
            default: '#4CAF50',
            heap: '#3b82f6',
            comparing: '#ef4444',
            swapping: '#f59e0b',
            done: '#16a34a'
        };

        const arrayContainer = document.getElementById('array-container');
        const arraySizeSelect = document.getElementById('array-size');
        const generateBtn = document.getElementById('generate-btn');
        const sortBtn = document.getElementById('sort-btn');
        const homeBtn = document.getElementById('home-btn');
        const speedInput = document.getElementById('speed');
        const timeSpan = document.getElementById('time');
        const speedValueSpan = document.getElementById('speed-value');

        function generateArray() {
            if (isSorting) return;

            array = [];
            for (let i = 0; i < arraySize; i++) {
                array.push(Math.floor(Math.random() * 100) + 1);
            }
            renderArray();
            timeSpan.textContent = '0';
        }

        function buildBaseMap(heapSize, sortedStart) {
            const map = {};

            for (let i = 0; i < heapSize; i++) {
                map[i] = COLORS.heap;
            }

            for (let i = sortedStart; i < array.length; i++) {
                map[i] = COLORS.done;
            }

            return map;
        }

        function renderArray(highlightMap = {}) {
            arrayContainer.innerHTML = '';
            const maxValue = Math.max(...array);

            array.forEach((value, index) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${(value / maxValue) * 100}%`;
                bar.style.backgroundColor = highlightMap[index] || COLORS.default;

                const label = document.createElement('div');
                label.className = 'bar-label';
                label.textContent = value;

                bar.appendChild(label);
                arrayContainer.appendChild(bar);
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function getDelay() {
            return 1010 - sortSpeed;
        }

        async function heapify(heapSize, rootIndex, sortedStart) {
            let largest = rootIndex;
            const left = 2 * rootIndex + 1;
            const right = 2 * rootIndex + 2;

            if (left < heapSize) {
                const leftMap = buildBaseMap(heapSize, sortedStart);
                leftMap[rootIndex] = COLORS.comparing;
                leftMap[left] = COLORS.comparing;
                renderArray(leftMap);
                await sleep(getDelay());

                if (array[left] > array[largest]) {
                    largest = left;
                }
            }

            if (right < heapSize) {
                const rightMap = buildBaseMap(heapSize, sortedStart);
                rightMap[rootIndex] = COLORS.comparing;
                rightMap[right] = COLORS.comparing;
                renderArray(rightMap);
                await sleep(getDelay());

                if (array[right] > array[largest]) {
                    largest = right;
                }
            }

            if (largest !== rootIndex) {
                [array[rootIndex], array[largest]] = [array[largest], array[rootIndex]];

                const swapMap = buildBaseMap(heapSize, sortedStart);
                swapMap[rootIndex] = COLORS.swapping;
                swapMap[largest] = COLORS.swapping;
                renderArray(swapMap);
                await sleep(getDelay());

                await heapify(heapSize, largest, sortedStart);
            }
        }

        async function heapSort() {
            if (isSorting) return;

            isSorting = true;
            generateBtn.disabled = true;
            sortBtn.disabled = true;
            arraySizeSelect.disabled = true;

            const startTime = performance.now();
            const n = array.length;

            for (let i = Math.floor(n / 2) - 1; i >= 0; i--) {
                await heapify(n, i, n);
            }

            for (let i = n - 1; i > 0; i--) {
                [array[0], array[i]] = [array[i], array[0]];

                const extractMap = buildBaseMap(i, i);
                extractMap[0] = COLORS.swapping;
                extractMap[i] = COLORS.swapping;
                renderArray(extractMap);
                await sleep(getDelay());

                await heapify(i, 0, i);

                const doneMap = buildBaseMap(i, i);
                renderArray(doneMap);
                await sleep(Math.max(60, getDelay() / 2));
            }

            renderArray(buildBaseMap(0, 0));
            const endTime = performance.now();
            timeSpan.textContent = ((endTime - startTime) / 1000).toFixed(2);

            isSorting = false;
            generateBtn.disabled = false;
            sortBtn.disabled = false;
            arraySizeSelect.disabled = false;
        }

        arraySizeSelect.addEventListener('change', () => {
            arraySize = parseInt(arraySizeSelect.value, 10);
            generateArray();
        });

        speedInput.addEventListener('input', () => {
            sortSpeed = parseInt(speedInput.value, 10);
            speedValueSpan.textContent = (1000 / (1010 - sortSpeed)).toFixed(1);
        });

        generateBtn.addEventListener('click', generateArray);
        sortBtn.addEventListener('click', heapSort);
        homeBtn.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        generateArray();
        speedValueSpan.textContent = (1000 / (1010 - sortSpeed)).toFixed(1);
    </script>
</body>
</html>
